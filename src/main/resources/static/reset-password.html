<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Restablecer contraseña — Barber System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0B1014;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: #F5F5F5;
    border-radius: 12px;
    padding: 28px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .logo-circle {
    width: 60px;
    height: 60px;
    border-radius: 30px;
    background: #1A1A1A;
    border: 2px solid #C9A84C;
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    color: #1A1A1A;
    margin-bottom: 6px;
  }
  p.subtitle {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 22px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #333;
    margin-bottom: 6px;
  }
  .field { margin-bottom: 16px; }
  input {
    width: 100%;
    padding: 12px;
    border: 1px solid #D8D8D8;
    border-radius: 6px;
    font-size: 14px;
    background: #FFF;
    color: #000;
  }
  input:focus {
    outline: none;
    border-color: #C9A84C;
  }
  button {
    width: 100%;
    padding: 13px;
    background: #2C2C2C;
    color: #FFF;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #1a1a1a; }
  .msg {
    margin-top: 16px;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    display: none;
  }
  .msg.error {
    background: #fff0f0;
    color: #E74C3C;
    border: 1px solid rgba(231,76,60,0.25);
  }
  .msg.success {
    background: #f0fff4;
    color: #2E7D32;
    border: 1px solid rgba(46,125,50,0.25);
  }
  .msg.show { display: block; }
  .hint {
    font-size: 11px;
    color: #888;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-circle">💈</div>
  <h1>Restablecer contraseña</h1>
  <p class="subtitle">Escribe tu nueva contraseña para continuar</p>

  <form id="resetForm">
    <div class="field">
      <label>Nueva contraseña</label>
      <input type="password" id="password" minlength="6" required placeholder="••••••••" />
      <div class="hint">Mínimo 6 caracteres</div>
    </div>

    <div class="field">
      <label>Confirmar contraseña</label>
      <input type="password" id="confirmPassword" minlength="6" required placeholder="••••••••" />
    </div>

    <button type="submit" id="submitBtn">Cambiar contraseña</button>
  </form>

  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>
</div>

<script>
  const API_BASE = "https://administrative-service.onrender.com";

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  const form = document.getElementById("resetForm");
  const submitBtn = document.getElementById("submitBtn");
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");

  function showError(text) {
    errorMsg.textContent = text;
    errorMsg.classList.add("show");
    successMsg.classList.remove("show");
  }

  function showSuccess(text) {
    successMsg.textContent = text;
    successMsg.classList.add("show");
    errorMsg.classList.remove("show");
  }

  if (!token) {
    showError("El enlace no es válido o le falta información. Solicita uno nuevo desde la app.");
    form.style.display = "none";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.classList.remove("show");
    successMsg.classList.remove("show");

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      showError("Las contraseñas no coinciden");
      return;
    }
    if (password.length < 6) {
      showError("La contraseña debe tener al menos 6 caracteres");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Cambiando...";

    try {
      const res = await fetch(`${API_BASE}/auth/reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, nuevaPassword: password }),
      });

      const data = await res.json();

      if (res.ok) {
        showSuccess("¡Contraseña actualizada! Ya puedes volver a la app e iniciar sesión.");
        form.style.display = "none";
      } else {
        showError(data.message || "El enlace expiró o ya fue usado. Solicita uno nuevo.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Cambiar contraseña";
      }
    } catch (err) {
      showError("No se pudo conectar. Verifica tu internet e intenta de nuevo.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Cambiar contraseña";
    }
  });
</script>

</body>
</html>
